name: Run Screeners

on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC, lun-ven (dopo la chiusura USA)
  workflow_dispatch:            # lancio manuale dalla tab Actions

jobs:
  screener:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy ta requests lxml

      - name: Run ETF screener
        run: python screener_etf.py

      - name: Run stocks screener
        run: python screener_stocks.py

      - name: Commit results
        run: |
          git config user.name "screener-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "Screener update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
